name: CI/CD Pipeline - Deploy to Oracle Cloud

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.REGISTRY_USERNAME }}/api-gateway:latest

  deploy-to-vm:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Oracle Cloud VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OCI_VM_IP }}
          username: ${{ secrets.OCI_VM_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            # 1. Log in to Docker Hub using sudo
            echo "${{ secrets.REGISTRY_PASSWORD }}" | sudo docker login -u "${{ secrets.REGISTRY_USERNAME }}" --password-stdin
            
            # 2. Stop and remove existing container instances safely using sudo
            sudo docker stop api-gateway || true
            sudo docker rm api-gateway || true
            
            # 3. Pull the updated image version using sudo
            sudo docker pull ${{ secrets.REGISTRY_USERNAME }}/api-gateway:latest
            
            # 4. Clean up any leftover image fragments using sudo
            sudo docker image prune -f
            
            # 5. Spin up the API Gateway container targeting local services
            sudo docker run -d \
              --name api-gateway \
              --network host \
              -p 8080:8080 \
              -e SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_DISCOVERY_LOCATOR_ENABLED=true \
              -e EUREKA_CLIENT_SERVICE-URL_DEFAULTZONE=http://127.0.0 \
              -e SPRING_R2DBC_URL=r2dbc:mysql://127.0.0.1:3306/micro_service_user_db \
              -e SPRING_R2DBC_USERNAME=root \
              -e SPRING_R2DBC_PASSWORD=Som1234567 \
              --restart always \
              ${{ secrets.REGISTRY_USERNAME }}/api-gateway:latest
