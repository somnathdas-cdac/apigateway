
name: CI/CD Pipeline - Deploy to Oracle Cloud

on:
  push:
    branches:
      - main  # Adjust this if your default branch is different (e.g., master)

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.REGISTRY_USERNAME }}/api-gateway:latest

  deploy-to-vm:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Oracle Cloud VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OCI_VM_IP }}
          username: ${{ secrets.OCI_VM_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            # Log in to Docker Hub on the remote VM
            echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login -u "${{ secrets.REGISTRY_USERNAME }}" --password-stdin
            
            # Stop and remove existing gateway container if running
            docker stop api-gateway || true
            docker rm api-gateway || true
            
            # Pull the freshly built image
            docker pull ${{ secrets.REGISTRY_USERNAME }}/api-gateway:latest
            
            # Prune obsolete dangling images to save disk space
            docker image prune -f
            
            # Run the container with your required property mappings
            docker run -d \
              --name api-gateway \
              -p 8080:8080 \
              -e SPRING_CLOUD_GATEWAY_SERVER_WEBFLUX_DISCOVERY_LOCATOR_ENABLED=true \
              -e EUREKA_CLIENT_SERVICE-URL_DEFAULTZONE=http://<YOUR_EUREKA_SERVER_IP>:8761/eureka/ \
              -e SPRING_R2DBC_URL=r2dbc:mysql://<YOUR_DB_SERVER_IP>:3306/micro_service_user_db \
              -e SPRING_R2DBC_USERNAME=root \
              -e SPRING_R2DBC_PASSWORD=Som1234567 \
              --restart always \
              ${{ secrets.REGISTRY_USERNAME }}/api-gateway:latest
