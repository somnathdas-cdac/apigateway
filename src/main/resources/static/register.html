<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>E-Cart Registration</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #f4f4f9; margin: 0; padding: 20px 0; }
        .register-box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0px 4px 10px rgba(0,0,0,0.1); width: 340px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9em; }
        .form-group input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #0056b3; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:hover { background-color: #218838; }
        #message { color: red; margin-top: 10px; font-size: 0.9em; min-height: 1.2em; text-align: center; }
        .link-box { margin-top: 15px; text-align: center; font-size: 0.9em; }
        .link-box a { color: #0056b3; text-decoration: none; }
    </style>
</head>
<body>
    <div class="register-box">
        <h2 style="margin-top: 0; text-align: center;">Create Account</h2>
        
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="Enter username" required>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="Enter email" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter password" required>
        </div>

        <div class="form-group">
            <label>Mobile Number</label>
            <input type="tel" id="mobile_no" placeholder="Enter mobile number">
        </div>

        <div class="form-group">
            <label>Address</label>
            <input type="text" id="address" placeholder="Enter your full address">
        </div>

        <button onclick="performRegistration()">Register</button>
        <p id="message"></p>
        
        <div class="link-box">
            Already have an account? <a href="login.html">Login here</a>
        </div>
    </div>

    <script>
        async function performRegistration() {
            const usernameInput = document.getElementById('username').value.trim();
            const emailInput = document.getElementById('email').value.trim();
            const passwordInput = document.getElementById('password').value;
            const mobileInput = document.getElementById('mobile_no').value.trim();
            const addressInput = document.getElementById('address').value.trim();
            const msg = document.getElementById('message');
            
            // Validate required fields
            if (!usernameInput || !emailInput || !passwordInput) {
                msg.style.color = "red";
                msg.innerText = "Username, email, and password are required.";
                return;
            }

            const payload = {
                username: usernameInput,
                email: emailInput,
                password: passwordInput,
                mobile_no: mobileInput,
                address: addressInput
            };

            try {
               // const response = await fetch('/api/auth/register', {
                const response = await fetch('/apiGateway-service/api/auth/register', {
                	
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.ok) {
                    alert("Registration successful! Redirecting to login page...");
                    window.location.href = "login.html";
                } else {
                    msg.style.color = "red";
                    msg.innerText = data.error || "Registration failed.";
                }
            } catch (err) {
                msg.style.color = "red";
                msg.innerText = "Error connecting to gateway server.";
                console.error(err);
            }
        }
    </script>
</body>
</html>
