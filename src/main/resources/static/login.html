<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>E-Cart Login</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f9; margin: 0; }
        .login-box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0px 4px 10px rgba(0,0,0,0.1); width: 300px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #0056b3; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #004085; }
        #message { color: red; margin-top: 10px; font-size: 0.9em; min-height: 1.2em; }
    </style>
</head>
<body>

<div class="login-box"> 
    <h2>Login Area</h2> 
    <div class="form-group"> 
        <label>Email Address</label> 
        <input type="email" id="email" placeholder="Enter email" required> 
    </div> 
    <div class="form-group"> 
        <label>Password</label> 
        <input type="password" id="password" placeholder="Enter password" required> 
    </div> 
    <button onclick="performLogin()">Login</button> 
    <p id="message"></p> 
</div>

<script> 
async function performLogin() { 
    const emailInput = document.getElementById('email').value.trim(); 
    const passwordInput = document.getElementById('password').value; 
    const msg = document.getElementById('message'); 
    
    if (!emailInput || !passwordInput) {
        msg.innerText = "Please fill in all fields.";
        return;
    }

    try { 
        // Sends email and password payload to Gateway auth endpoint
        const response = await fetch('/api/auth/login', { 
            method: 'POST', 
            headers: { 'Content-Type': 'application/json' }, 
            body: JSON.stringify({ email: emailInput, password: passwordInput }) 
        }); 
 
        const data = await response.json(); 
 
        if (response.ok) { 
            // Persist token and email in local memory
            localStorage.setItem("jwt_token", data.token); 
            localStorage.setItem("logged_in_email", data.email); 
 
            alert("Login successful!"); 
 
            // Return back to the catalog view
           //window.location.href = "/"; 
            window.location.href = "/index.html"
        } else { 
            msg.innerText = data.error || "Authentication failed."; 
        } 
    } catch (err) { 
        msg.innerText = "Error connecting to gateway server."; 
        console.error(err);
    } 
} 
</script> 
</body> 
</html>
