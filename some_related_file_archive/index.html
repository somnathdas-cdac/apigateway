<!DOCTYPE html>
<html lang="en">
<head> 
 <meta charset="UTF-8"> 
 <title>Product Catalog</title> 
 
 <style> 
 body { font-family: Arial, sans-serif; margin: 40px; background-color: #f8f9fa; } 
 .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; } 
 .card { border: 1px solid #ccc; padding: 20px; border-radius: 8px; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.05); } 
 .price { color: green; font-weight: bold; font-size: 1.2em; }
 .category { font-style: italic; color: #555; } 
 .btn-order { background-color: #28a745; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; margin-top: 10px; width: 100%; font-weight: bold;} 
 .btn-order:hover { background-color: #218838; } 
 .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #ddd;}
 .user-badge { background-color: #e9ecef; padding: 8px 15px; border-radius: 20px; font-weight: bold; color: #333; display: flex; align-items: center; gap: 10px; }
 .btn-logout { background-color: #dc3545; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.85em; }
 .btn-login-nav { background-color: #007bff; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold;}
 </style>

 <script> 
 window.onload = function() { 
     updateUserNavbarUI();
     loadProductsViaGateway();
 }; 

 async function loadProductsViaGateway() {
     try {
         const response = await fetch('/product-service/api/products'); 
         if (!response.ok) throw new Error("Failed to load products");
         
         const products = await response.json();
         const gridContainer = document.getElementById("product-grid");
         gridContainer.innerHTML = ""; 

         products.forEach(product => {
             const card = document.createElement("div");
             card.className = "card";
             // Cleaned up arguments inside the onclick handler to escape strings safely
             card.innerHTML = `
                 <h2>${product.name}</h2>
                 <p class="category">Category: ${product.category || 'General'}</p>
                 <p>${product.description || ''}</p>
                 <p class="price">$${product.price}</p>
                 <button class="btn-order" onclick="placeSecureOrder('${product.id}', '${product.name.replace(/'/g, "\\'")}', ${product.price})">Place Order</button>
             `;
             gridContainer.appendChild(card);
         });
     } catch (err) {
         document.getElementById("product-grid").innerHTML = "<p style='color:red;'>Error fetching products from microservice.</p>";
     }
 }

 // Displays the user's logged-in email directly at the top right header area
 function updateUserNavbarUI() {
     const userEmail = localStorage.getItem("logged_in_user");
     const authDisplay = document.getElementById("auth-display");
     
     if (userEmail && authDisplay) {
         authDisplay.innerHTML = `
             <div class="user-badge">
                 📧 Email: <span>${userEmail}</span>
                 <button class="btn-logout" onclick="handleLogout()">Logout</button>
             </div>
         `;
     } else if (authDisplay) {
         authDisplay.innerHTML = `<button class="btn-login-nav" onclick="window.location.href='/login.html'">Login</button>`;
     }
 }

 function handleLogout() {
     localStorage.clear();
     window.location.reload();
 }

 // Accept the productName parameter from the catalog card click event
 async function placeSecureOrder(productId, productName, price) { 
     const token = localStorage.getItem("jwt_token"); 
     
     if (!token) { 
         alert("You must be logged in to place an order! Redirecting to login page..."); 
         window.location.href = "/login.html"; 
         return; 
     } 
     await executeOrderRequest(productId, productName, price, token); 
 } 

 // Appends the dynamic product name securely as a request query parameter
 async function executeOrderRequest(productId, productName, price, token) { 
     try { 
         const url = `/order-service/orders?productId=${productId}&productName=${encodeURIComponent(productName)}&quantity=1`;
         const response = await fetch(url, { 
             method: 'POST', 
             headers: { 
                 'Authorization': 'Bearer ' + token 
             } 
         }); 
         
         if (response.status === 401 || response.status === 403) { 
             alert("Session expired. Please log in again."); 
             handleLogout();
         } else if (response.ok) { 
             alert("Order placed successfully for: " + productName); 
         } else { 
             alert("Failed to create order at the Order Microservice."); 
         } 
     } catch (err) { 
         alert("Error: Cannot connect to the API Gateway."); 
     } 
 } 
 </script>
</head>
<body>

    <div class="header-bar">
        <h1>Available Products</h1>
        <div id="auth-display"></div>
    </div>
    
    <div class="grid" id="product-grid">
        <p>Loading catalog items dynamically...</p>
    </div>

</body>
</html>
